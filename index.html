<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>calculadora inteligente</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <h1 id="t1">Calculadora Inteligente</h1>
    <h3 id="d1">Bienvenido a la calculadora inteligente!</h3>

    <input class="entradas" type="text" id="ecuacion" placeholder="ingresa tu ecuacion">
    <br>

    <button id="b1" onclick="resolver()">calcular</button>
    <br>

    <h3 id="tresultado">Pasos:</h3>
    <div id="resultado"></div>

<script>
    console.log("JS cargado");

    // 👇 esperar que todo cargue (más seguro en GitHub Pages)
    document.addEventListener("DOMContentLoaded", function () {

        document.getElementById("ecuacion").focus();

        document.getElementById("ecuacion").addEventListener("keydown", function(event) {
            if (event.key === "Enter") {
                event.preventDefault();
                resolver();
            }
        });

    });

    function resolver() {
        console.log("BOTON FUNCIONA");

        let ecuacion = document.getElementById("ecuacion").value;
        let contenedor = document.getElementById("resultado");

        // validar input vacío
        if (ecuacion.trim() === "") {
            contenedor.innerHTML = "<p>⚠️ escribe una ecuación</p>";
            return;
        }

        contenedor.innerHTML = "<p>Calculando...</p>";

        fetch("https://calculadora-inteligente-uulb.onrender.com/resolver", {
            method: "POST",
            headers: {
                "Content-Type": "application/json"
            },
            body: JSON.stringify({ ecuacion: ecuacion })
        })
        .then(response => response.json())
        .then(data => {
            setTimeout(() => {
                contenedor.innerHTML = "";

                let i = 0;

                function mostrarPaso() {
                    if (i < data.pasos.length) {
                        let p = document.createElement("p");
                        p.innerText = data.pasos[i];
                        contenedor.appendChild(p);

                        i++;
                        setTimeout(mostrarPaso, 500);
                    }
                }

                mostrarPaso();

            }, 500);

            // limpiar input
            document.getElementById("ecuacion").value = "";
        })
        .catch(error => {
            console.error("Error:", error);
            contenedor.innerHTML = "<p>❌ Error al conectar con el servidor</p>";
        });
    }
</script>

</body>
</html>
