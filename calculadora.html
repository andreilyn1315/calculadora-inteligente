<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>calculadora inteligente</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <h1 id="t1">Calculadora Inteligente</h1>
    <h3 id="d1">Bienvenido a la calculadora inteligente!</h3>

    <input class="entradas" type="text" id="ecuacion" placeholder="ingresa tu ecuacion">
    <br>

    <button id="b1" onclick="resolver()">calcular</button>
    <br>

    <h3 id="tresultado">Pasos:</h3>
    <div id="resultado"></div>

<script>
    console.log("JS cargado");

    function resolver() {
        console.log("BOTON FUNCIONA");

        let ecuacion = document.getElementById("ecuacion").value;
        let contenedor = document.getElementById("resultado");

        // Limpiar resultados anteriores
        contenedor.innerHTML = "";

        fetch("http://127.0.0.1:5000/resolver", {
            method: "POST",
            headers: {
                "Content-Type": "application/json"
            },
            body: JSON.stringify({ ecuacion: ecuacion })
        })

        .then(response => response.json())
        .then(data => {
            data.pasos.forEach(paso => {
                let p = document.createElement("p");
                p.innerText = paso;
                contenedor.appendChild(p);
            });
        })

        .catch(error => {
            console.error("Error:", error);
        });
    }
</script>

<div class="pasos"></div>

</body>
</html>
